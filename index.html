<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>카카오페이 송금</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', '맑은 고딕', sans-serif;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .phone {
    width: 100%;
    max-width: 420px;
    min-height: 100vh;
    background: #fff;
    position: relative;
    overflow: hidden;
  }

  @media (min-width: 500px) {
    .phone {
      min-height: 740px;
      max-height: 740px;
      border-radius: 24px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    }
    body { padding: 20px; }
  }

  /* ===== 송금 화면 ===== */
  .transfer-screen {
    display: flex;
    flex-direction: column;
    height: 100%;
    min-height: 100vh;
    background: #fff;
    transition: opacity 0.3s;
  }

  @media (min-width: 500px) {
    .transfer-screen { min-height: 740px; }
  }

  .header {
    background: #FEE500;
    padding: 0 16px;
    height: 52px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .header-back {
    font-size: 22px;
    color: #3C1E1E;
    line-height: 1;
  }
  .header-title {
    font-size: 16px;
    font-weight: 600;
    color: #3C1E1E;
  }

  .transfer-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 28px 24px;
  }

  .check-icon {
    width: 68px;
    height: 68px;
    border-radius: 50%;
    background: #FEE500;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
  }
  .check-icon svg {
    width: 32px;
    height: 32px;
  }

  .amount {
    font-size: 34px;
    font-weight: 700;
    color: #111;
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }
  .amount .unit {
    font-size: 20px;
    font-weight: 500;
  }

  .status-text {
    font-size: 15px;
    color: #555;
    margin-bottom: 36px;
  }

  .detail-box {
    width: 100%;
    background: #F7F7F7;
    border-radius: 14px;
    padding: 20px 22px;
  }
  .detail-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    padding: 6px 0;
  }
  .detail-row + .detail-row {
    border-top: 1px solid #EBEBEB;
    margin-top: 6px;
    padding-top: 12px;
  }
  .detail-label { color: #999; }
  .detail-value { color: #333; font-weight: 500; }

  .transfer-footer {
    padding: 16px 20px 36px;
    flex-shrink: 0;
  }
  .confirm-btn {
    background: #FEE500;
    color: #3C1E1E;
    border: none;
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: filter 0.15s;
  }
  .confirm-btn:active {
    filter: brightness(0.92);
  }

  /* ===== Reveal 화면 ===== */
  .reveal-screen {
    position: absolute;
    inset: 0;
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 30px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
    z-index: 10;
  }
  .reveal-screen.active {
    opacity: 1;
    pointer-events: auto;
  }

  canvas#confetti {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  .reveal-content {
    position: relative;
    z-index: 1;
  }

  .ppung-img {
    width: 200px;
    max-width: 60vw;
    margin-bottom: 20px;
    animation: ppungBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    border-radius: 16px;
  }

  .ppung-text {
    font-size: 48px;
    font-weight: 900;
    color: #E8352E;
    text-shadow: 2px 2px 0 #A01010;
    letter-spacing: 4px;
    margin-bottom: 20px;
    animation: ppungBounce 0.6s 0.1s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  .reveal-msg1 {
    font-size: 26px;
    font-weight: 800;
    color: #FEE500;
    margin-bottom: 8px;
    animation: fadeUp 0.5s 0.3s both;
  }
  .reveal-msg2 {
    font-size: 32px;
    font-weight: 800;
    color: #fff;
    margin-bottom: 28px;
    animation: fadeUp 0.5s 0.45s both;
  }
  .reveal-sub {
    font-size: 14px;
    color: #666;
    animation: fadeUp 0.5s 0.6s both;
  }

  @keyframes ppungBounce {
    0% { transform: scale(0) rotate(-10deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  @keyframes fadeUp {
    0% { transform: translateY(20px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }
</style>
</head>
<body>

<div class="phone">
  <!-- 송금 수신 화면 -->
  <div class="transfer-screen" id="transferScreen">
    <div class="header">
      <span class="header-back">&#x2190;</span>
      <span class="header-title">카카오페이 송금</span>
    </div>

    <div class="transfer-body">
      <div class="check-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#3C1E1E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>

      <div class="amount" id="amountDisplay">0<span class="unit">원</span></div>
      <div class="status-text">받기 완료</div>

      <div class="detail-box">
        <div class="detail-row">
          <span class="detail-label">보낸 사람</span>
          <span class="detail-value" id="senderName">홍길동</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">받은 시간</span>
          <span class="detail-value" id="receiveTime"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">메시지</span>
          <span class="detail-value" id="messageText">축하해~ 🎁</span>
        </div>
      </div>
    </div>

    <div class="transfer-footer">
      <button class="confirm-btn" id="confirmBtn">확인</button>
    </div>
  </div>

  <!-- Reveal 화면 -->
  <div class="reveal-screen" id="revealScreen">
    <canvas id="confetti"></canvas>
    <div class="reveal-content">
      <img class="ppung-img" id="ppungImg" src="img/ppung.png"
           onerror="this.style.display='none'; document.getElementById('ppungFallback').style.display='block';">
      <div class="ppung-text" id="ppungFallback" style="display:none;">뻥이요</div>
      <div class="reveal-msg1">만우절인데</div>
      <div class="reveal-msg2">그걸 또 속냐 ㅋㅋ</div>
      <div class="reveal-sub">Happy April Fools' Day! 🤪</div>
    </div>
  </div>
</div>

<script>
// URL 파라미터 파싱
const params = new URLSearchParams(window.location.search);
const name = params.get('name') || '홍길동';
const amount = parseInt(params.get('amount') || '100000000', 10);
const msg = params.get('msg') || '축하해~ 🎁';

// 화면에 값 세팅
document.getElementById('senderName').textContent = name;
document.getElementById('amountDisplay').innerHTML =
  amount.toLocaleString('ko-KR') + '<span class="unit">원</span>';
document.getElementById('messageText').textContent = msg;

// 현재 시간 표시
const now = new Date();
const y = now.getFullYear();
const m = String(now.getMonth() + 1).padStart(2, '0');
const d = String(now.getDate()).padStart(2, '0');
const hour = now.getHours();
const min = String(now.getMinutes()).padStart(2, '0');
const ampm = hour < 12 ? '오전' : '오후';
const h12 = hour % 12 || 12;
document.getElementById('receiveTime').textContent =
  `${y}.${m}.${d} ${ampm} ${h12}:${min}`;

// 확인 버튼 → Reveal
document.getElementById('confirmBtn').addEventListener('click', function() {
  document.getElementById('revealScreen').classList.add('active');
  startConfetti();
});

// === 컨페티 애니메이션 ===
function startConfetti() {
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * 2;
  canvas.height = canvas.offsetHeight * 2;
  ctx.scale(2, 2);
  const W = canvas.offsetWidth;
  const H = canvas.offsetHeight;

  const colors = ['#FEE500', '#E8352E', '#FF6B6B', '#4ECDC4', '#45B7D1',
                  '#F7DC6F', '#BB8FCE', '#FF9FF3', '#54A0FF', '#00D2D3'];
  const pieces = [];
  const TOTAL = 120;

  for (let i = 0; i < TOTAL; i++) {
    pieces.push({
      x: Math.random() * W,
      y: Math.random() * H * -1,
      w: Math.random() * 10 + 5,
      h: Math.random() * 6 + 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - 0.5) * 4,
      vy: Math.random() * 3 + 2,
      rotation: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 10,
      opacity: 1
    });
  }

  let frame = 0;
  const maxFrames = 300;

  function draw() {
    ctx.clearRect(0, 0, W, H);
    frame++;

    for (const p of pieces) {
      p.x += p.vx;
      p.vy += 0.05;
      p.y += p.vy;
      p.rotation += p.rotSpeed;

      if (frame > maxFrames * 0.7) {
        p.opacity = Math.max(0, p.opacity - 0.015);
      }

      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate((p.rotation * Math.PI) / 180);
      ctx.globalAlpha = p.opacity;
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    }

    if (frame < maxFrames) {
      requestAnimationFrame(draw);
    }
  }

  draw();
}
</script>
</body>
</html>
